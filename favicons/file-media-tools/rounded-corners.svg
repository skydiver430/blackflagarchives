<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    @media (prefers-color-scheme: dark) {
      .outer { fill: #e0e0e0; }
      .inner { fill: #2a2a2a; }
    }
    @media (prefers-color-scheme: light) {
      .outer { fill: #000000; }
      .inner { fill: white; }
    }
  </style>
  <rect class="outer" width="100" height="100" rx="12"/>
  <rect class="inner" x="20" y="20" width="60" height="60" rx="8"/>
</svg>
